<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
    <title>NEO STRIKER · ARCADE BATTLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', 'VT323', 'Orbitron', monospace;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            background: rgba(0,0,0,0.3);
        }

        /* Barra superior de estadísticas compacta */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-bottom: 2px solid #00ffff;
            font-family: monospace;
            font-weight: bold;
            color: #0ff;
            text-shadow: 0 0 3px #0ff;
            flex-shrink: 0;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 40px;
        }

        .stat span {
            color: #ff66cc;
            font-size: 0.85rem;
            font-weight: 800;
        }

        /* Contenedor del canvas */
        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: auto;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 0 3px #0ff, 0 0 0 6px #1a2a3a;
            cursor: none;
        }

        /* Panel de controles táctiles */
        .touch-panel {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,255,255,0.4);
            flex-shrink: 0;
        }

        .touch-btn {
            background: rgba(20,20,40,0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #0ff;
            border-radius: 60px;
            width: 60px;
            height: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #0ff;
            text-align: center;
            line-height: 54px;
            box-shadow: 0 4px 0 #006688;
            transition: 0.05s linear;
            touch-action: manipulation;
            cursor: pointer;
        }

        .touch-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #006688;
        }

        @media (min-width: 800px) {
            .touch-panel { display: none; }
        }

        /* Menú flotante */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: linear-gradient(145deg, #0a1a2a, #021018);
            border: 3px solid #0ff;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            width: 280px;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }

        .menu-card h1 {
            font-size: 1.6rem;
            color: #0ff;
            text-shadow: 0 0 8px cyan;
            margin-bottom: 12px;
            font-family: monospace;
        }

        .menu-card button {
            background: linear-gradient(145deg, #0ff, #0a8);
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            border-radius: 60px;
            color: #021018;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0088aa;
            transition: 0.05s linear;
        }

        .menu-card button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0088aa;
        }

        .highscore-text {
            margin-top: 16px;
            color: #ffcc88;
            background: #00000066;
            padding: 8px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .footer-tip {
            font-size: 0.6rem;
            margin-top: 12px;
            color: #88aaff;
        }
        
        .difficulty-badge {
            background: #0ff;
            color: #021018;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        @keyframes warningFlash {
            0% { text-shadow: 0 0 0 red; }
            100% { text-shadow: 0 0 10px #ff3366; }
        }
        .time-critical {
            animation: warningFlash 0.6s infinite alternate;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Barra de estadísticas fuera del canvas -->
    <div class="stats-bar">
        <div class="stat">🎯 SCORE: <span id="scoreValue">0</span></div>
        <div class="stat">❤️ <span id="livesValue">2</span></div>
        <div class="stat">⏱️ <span id="timeValue">60</span>s</div>
        <div class="stat">🏆 BEST: <span id="bestValue">0</span></div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
    </div>

    <div class="touch-panel">
        <button class="touch-btn" id="leftTouch">◀</button>
        <button class="touch-btn" id="rightTouch">▶</button>
        <button class="touch-btn" id="upTouch">▲</button>
        <button class="touch-btn" id="downTouch">▼</button>
    </div>
</div>

<div id="menuOverlay" class="menu-overlay">
    <div class="menu-card">
        <h1>⚡ NEO STRIKER ⚡</h1>
        <div class="difficulty-badge">🔫 MODO ARCADE</div>
        <button id="startBattleBtn">🚀 INICIAR BATALLA 🚀</button>
        <div class="highscore-text">🏅 RÉCORD: <span id="menuBest">0</span></div>
        <div class="footer-tip">
            🖥️ PC: FLECHAS mover | ESPACIO o CLIC disparar<br>
            📱 MÓVIL: ARRASTRA o BOTONES | DISPARO AUTOMÁTICO
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIGURACIÓN CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 600;
        canvas.width = W;
        canvas.height = H;

        // ---------- ESTADO JUEGO ----------
        let score = 0;
        let lives = 2;
        let timeLeft = 60;
        let gameActive = false;
        let invincibilityFrames = 0;
        const INVINCIBLE_DURATION = 45;
        
        // ---------- NAVE JUGADOR ----------
        let player = {
            x: W/2,
            y: H - 70,
            radius: 22,
            speed: 7
        };
        
        // Disparo automático (móvil)
        let autoShootActive = false;
        let autoShootInterval = null;
        let isMobile = false;
        
        // Detectar móvil por ancho de pantalla o touch
        function detectMobile() {
            return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 768);
        }
        
        // Estados de teclas
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
        };
        
        // Control táctil con arrastre (mover dedo)
        let touchActive = false;
        let touchX = 0, touchY = 0;
        
        // Controles táctiles botones
        let touchLeft = false, touchRight = false, touchUp = false, touchDown = false;
        
        // ---------- DISPAROS ----------
        let bullets = [];
        let shootCooldown = 0;
        const SHOOT_DELAY_FRAMES = 5;
        
        // ---------- ENEMIGOS ----------
        let enemies = [];
        let enemySpawnCounter = 0;
        let baseSpawnDelay = 28;
        
        // ---------- EFECTOS ----------
        let explosions = [];
        let messages = [];
        
        // Clase enemigo
        class Enemy {
            constructor(x, y, speedY, size, hp, type) {
                this.x = x;
                this.y = y;
                this.speedY = speedY;
                this.size = size;
                this.hp = hp;
                this.type = type;
                this.angle = 0;
            }
        }
        
        class Explosion {
            constructor(x, y, big = false) {
                this.x = x;
                this.y = y;
                this.life = 14;
                this.big = big;
            }
        }
        
        class FloatingMessage {
            constructor(x, y, text) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.life = 30;
            }
        }
        
        // ---------- UI ----------
        let bestScore = 0;
        try {
            let stored = localStorage.getItem('neostriker_best');
            if(stored) bestScore = parseInt(stored);
        } catch(e) {}
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
            document.getElementById('livesValue').innerText = lives;
            document.getElementById('timeValue').innerText = timeLeft;
            document.getElementById('bestValue').innerText = bestScore;
            document.getElementById('menuBest').innerText = bestScore;
            
            if(timeLeft <= 10 && gameActive) {
                document.getElementById('timeValue').classList.add('time-critical');
            } else {
                document.getElementById('timeValue').classList.remove('time-critical');
            }
        }
        
        function showDamageEffect() {
            const livesSpan = document.getElementById('livesValue');
            livesSpan.style.transform = 'scale(1.3)';
            setTimeout(() => livesSpan.style.transform = '', 200);
        }
        
        // ---------- SPAWN ENEMIGOS ----------
        function spawnEnemy() {
            if(!gameActive) return;
            let r = Math.random();
            let type = 0;
            let size = 22;
            let hp = 1;
            let speedY = 2.4;
            
            if(r < 0.2) {        // Nave nodriza (grande)
                type = 1;
                size = 34;
                hp = 3;
                speedY = 1.3;
            } else if(r < 0.4) { // Interceptor rápido
                type = 2;
                size = 18;
                hp = 1;
                speedY = 4.0;
            } else {
                type = 0;
                size = 22;
                hp = 1;
                speedY = 2.2 + Math.random() * 0.8;
            }
            
            let margin = size + 15;
            let x = margin + Math.random() * (W - margin * 2);
            let y = -size - Math.random() * 50;
            enemies.push(new Enemy(x, y, speedY, size, hp, type));
        }
        
        // ---------- DISPARO ----------
        function shoot() {
            if(!gameActive) return false;
            if(shootCooldown > 0) return false;
            
            bullets.push({
                x: player.x,
                y: player.y - 14,
                vx: 0,
                vy: -16,
                radius: 5
            });
            shootCooldown = SHOOT_DELAY_FRAMES;
            return true;
        }
        
        // Disparo automático para móvil
        function startAutoShoot() {
            if(autoShootInterval) clearInterval(autoShootInterval);
            autoShootInterval = setInterval(() => {
                if(gameActive && isMobile) {
                    shoot();
                }
            }, 70);
        }
        
        function stopAutoShoot() {
            if(autoShootInterval) {
                clearInterval(autoShootInterval);
                autoShootInterval = null;
            }
        }
        
        // ---------- DAÑO AL JUGADOR ----------
        function damagePlayer() {
            if(!gameActive) return;
            if(invincibilityFrames > 0) return;
            
            lives--;
            updateUI();
            showDamageEffect();
            
            if(lives <= 0) {
                gameActive = false;
                stopAutoShoot();
                document.getElementById('startBattleBtn').innerText = '💀 GAME OVER 💀';
                for(let k=0;k<25;k++) explosions.push(new Explosion(player.x + (Math.random()-0.5)*70, player.y + (Math.random()-0.5)*70, true));
            } else {
                invincibilityFrames = INVINCIBLE_DURATION;
                messages.push(new FloatingMessage(player.x, player.y - 30, "¡-1 VIDA!"));
                for(let k=0;k<12;k++) explosions.push(new Explosion(player.x + (Math.random()-0.5)*45, player.y + (Math.random()-0.5)*45));
            }
        }
        
        // ---------- DIBUJAR NAVE JUGADOR ----------
        function drawPlayerShip(x, y, radius, invincible) {
            if(invincible && (Math.floor(Date.now() / 60) % 3 < 1)) return;
            
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#0af";
            
            // Cuerpo principal
            ctx.beginPath();
            ctx.moveTo(x, y - radius);
            ctx.lineTo(x - radius * 0.7, y + radius * 0.3);
            ctx.lineTo(x - radius * 0.3, y + radius * 0.1);
            ctx.lineTo(x - radius * 0.3, y + radius * 0.6);
            ctx.lineTo(x, y + radius * 0.4);
            ctx.lineTo(x + radius * 0.3, y + radius * 0.6);
            ctx.lineTo(x + radius * 0.3, y + radius * 0.1);
            ctx.lineTo(x + radius * 0.7, y + radius * 0.3);
            ctx.closePath();
            
            const grad = ctx.createLinearGradient(x - 10, y - 15, x + 10, y + 15);
            grad.addColorStop(0, "#3ccbff");
            grad.addColorStop(1, "#0a6eaa");
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = "#88ffff";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Alas laterales
            ctx.beginPath();
            ctx.moveTo(x - radius * 0.7, y + radius * 0.3);
            ctx.lineTo(x - radius * 1.1, y + radius * 0.5);
            ctx.lineTo(x - radius * 0.5, y + radius * 0.4);
            ctx.fillStyle = "#2a9acc";
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x + radius * 0.7, y + radius * 0.3);
            ctx.lineTo(x + radius * 1.1, y + radius * 0.5);
            ctx.lineTo(x + radius * 0.5, y + radius * 0.4);
            ctx.fill();
            
            // Cabina
            ctx.beginPath();
            ctx.arc(x, y - radius * 0.4, radius * 0.28, 0, Math.PI * 2);
            ctx.fillStyle = "#aaffff";
            ctx.fill();
            ctx.fillStyle = "#44ccff";
            ctx.beginPath();
            ctx.arc(x, y - radius * 0.45, radius * 0.14, 0, Math.PI * 2);
            ctx.fill();
            
            // Motor
            ctx.beginPath();
            ctx.moveTo(x - 8, y + radius * 0.5);
            ctx.lineTo(x, y + radius * 0.85);
            ctx.lineTo(x + 8, y + radius * 0.5);
            ctx.fillStyle = "#ff8844";
            ctx.fill();
            
            ctx.restore();
        }
        
        // ---------- DIBUJAR ENEMIGOS ----------
        function drawEnemyShip(e) {
            ctx.save();
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ff3366";
            
            const x = e.x, y = e.y, size = e.size;
            
            if(e.type === 0) { // Caza
                const grad = ctx.createLinearGradient(x - 10, y - 8, x + 10, y + 8);
                grad.addColorStop(0, "#b52e6e");
                grad.addColorStop(1, "#8b1a4a");
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(x, y - size * 0.65);
                ctx.lineTo(x - size * 0.75, y + size * 0.3);
                ctx.lineTo(x - size * 0.4, y + size * 0.1);
                ctx.lineTo(x - size * 0.4, y + size * 0.5);
                ctx.lineTo(x, y + size * 0.3);
                ctx.lineTo(x + size * 0.4, y + size * 0.5);
                ctx.lineTo(x + size * 0.4, y + size * 0.1);
                ctx.lineTo(x + size * 0.75, y + size * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = "#ff4466";
                ctx.beginPath();
                ctx.arc(x - 5, y - 3, 3, 0, Math.PI * 2);
                ctx.arc(x + 5, y - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if(e.type === 1) { // Nodriza
                ctx.fillStyle = "#c95a1c";
                ctx.beginPath();
                ctx.ellipse(x, y, size * 0.8, size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#ffaa66";
                ctx.beginPath();
                ctx.rect(x - size * 0.7, y - size * 0.2, size * 1.4, size * 0.35);
                ctx.fill();
                ctx.fillStyle = "#ff4422";
                ctx.beginPath();
                ctx.arc(x - 8, y - 4, 5, 0, Math.PI * 2);
                ctx.arc(x + 8, y - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                // Barra de vida
                ctx.fillStyle = "#55ff77";
                ctx.fillRect(x - size * 0.6, y - size * 0.7, (size * 1.2) * (e.hp / 3), 5);
            } else { // Interceptor
                ctx.fillStyle = "#7a3a9e";
                ctx.beginPath();
                ctx.moveTo(x, y - size * 0.6);
                ctx.lineTo(x - size * 0.55, y + size * 0.2);
                ctx.lineTo(x - size * 0.25, y + size * 0.4);
                ctx.lineTo(x, y + size * 0.1);
                ctx.lineTo(x + size * 0.25, y + size * 0.4);
                ctx.lineTo(x + size * 0.55, y + size * 0.2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = "#ff88ff";
                ctx.beginPath();
                ctx.arc(x - 4, y - 2, 2.5, 0, Math.PI * 2);
                ctx.arc(x + 4, y - 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        // ---------- ACTUALIZACIÓN DEL JUEGO ----------
        function updateGame() {
            if(!gameActive) return;
            
            // Movimiento nave (teclado o táctil arrastre)
            let moveX = 0, moveY = 0;
            
            if(touchActive) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let canvasX = (touchX - rect.left) * scaleX;
                let canvasY = (touchY - rect.top) * scaleY;
                canvasX = Math.min(Math.max(canvasX, player.radius + 8), W - player.radius - 8);
                canvasY = Math.min(Math.max(canvasY, player.radius + 40), H - player.radius - 15);
                player.x = canvasX;
                player.y = canvasY;
            } else {
                if(keys.ArrowLeft || touchLeft) moveX = -1;
                if(keys.ArrowRight || touchRight) moveX = 1;
                if(keys.ArrowUp || touchUp) moveY = -1;
                if(keys.ArrowDown || touchDown) moveY = 1;
                
                if(moveX !== 0 || moveY !== 0) {
                    let len = Math.hypot(moveX, moveY);
                    moveX /= len;
                    moveY /= len;
                }
                let newX = player.x + moveX * player.speed;
                let newY = player.y + moveY * player.speed;
                player.x = Math.min(Math.max(newX, player.radius + 8), W - player.radius - 8);
                player.y = Math.min(Math.max(newY, player.radius + 40), H - player.radius - 15);
            }
            
            if(shootCooldown > 0) shootCooldown--;
            if(invincibilityFrames > 0) invincibilityFrames--;
            
            // Spawn enemigos
            if(enemySpawnCounter <= 0) {
                let tiempoFactor = Math.min(0.6, (60 - timeLeft) / 100);
                let delayActual = Math.max(18, Math.floor(baseSpawnDelay * (1 - tiempoFactor * 0.25)));
                spawnEnemy();
                enemySpawnCounter = delayActual;
                if(Math.random() < 0.12 && timeLeft > 5) spawnEnemy();
            } else {
                enemySpawnCounter--;
            }
            
            // Mover balas
            for(let i=0; i<bullets.length; i++) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if(bullets[i].x + bullets[i].radius < 0 || bullets[i].x - bullets[i].radius > W ||
                   bullets[i].y + bullets[i].radius < 0 || bullets[i].y - bullets[i].radius > H) {
                    bullets.splice(i,1);
                    i--;
                }
            }
            
            // Mover enemigos y colisiones con balas
            for(let i=0; i<enemies.length; i++) {
                const e = enemies[i];
                e.y += e.speedY;
                
                for(let j=0; j<bullets.length; j++) {
                    const b = bullets[j];
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if(dist < e.size + b.radius) {
                        bullets.splice(j,1);
                        j--;
                        e.hp--;
                        explosions.push(new Explosion(e.x + (Math.random()-0.5)*12, e.y + (Math.random()-0.5)*12));
                        
                        if(e.hp <= 0) {
                            let puntos = (e.type === 0) ? 10 : (e.type === 1 ? 35 : 18);
                            score += puntos;
                            updateUI();
                            messages.push(new FloatingMessage(e.x, e.y, `+${puntos}`));
                            explosions.push(new Explosion(e.x, e.y, e.type === 1));
                            enemies.splice(i,1);
                            i--;
                            break;
                        }
                    }
                }
            }
            
            // Colisión con jugador
            for(let i=0; i<enemies.length; i++) {
                const e = enemies[i];
                const dist = Math.hypot(player.x - e.x, player.y - e.y);
                if(dist < player.radius + e.size) {
                    damagePlayer();
                    enemies.splice(i,1);
                    i--;
                    if(!gameActive) break;
                }
            }
            
            // Limpiar enemigos fuera
            for(let i=0; i<enemies.length; i++) {
                if(enemies[i].y + enemies[i].size < -100 || enemies[i].y - enemies[i].size > H+150) {
                    enemies.splice(i,1);
                    i--;
                }
            }
            
            // Actualizar explosiones
            for(let i=0; i<explosions.length; i++) {
                explosions[i].life--;
                if(explosions[i].life <= 0) {
                    explosions.splice(i,1);
                    i--;
                }
            }
            
            // Actualizar mensajes
            for(let i=0; i<messages.length; i++) {
                messages[i].life--;
                messages[i].y -= 1.2;
                if(messages[i].life <= 0) {
                    messages.splice(i,1);
                    i--;
                }
            }
            
            // Victoria por tiempo
            if(timeLeft <= 0 && gameActive) {
                gameActive = false;
                stopAutoShoot();
                if(score > bestScore) {
                    bestScore = Math.floor(score);
                    localStorage.setItem('neostriker_best', bestScore);
                    updateUI();
                }
                document.getElementById('startBattleBtn').innerText = '🏆 ¡VICTORIA! 🏆';
                for(let i=0;i<40;i++) explosions.push(new Explosion(player.x + (Math.random()-0.5)*100, player.y + (Math.random()-0.5)*80, true));
                messages.push(new FloatingMessage(W/2, H/2, "¡MISIÓN COMPLETA!"));
            }
        }
        
        // ---------- TEMPORIZADOR ----------
        let lastSecondMark = 0;
        function updateTimer(nowSec) {
            if(!gameActive) return;
            if(lastSecondMark === 0) {
                lastSecondMark = nowSec;
                return;
            }
            if(nowSec - lastSecondMark >= 1.0) {
                if(timeLeft > 0) {
                    timeLeft--;
                    updateUI();
                }
                lastSecondMark = nowSec;
            }
        }
        
        // ---------- DIBUJO ----------
        function draw() {
            ctx.clearRect(0,0,W,H);
            
            // Fondo espacial
            ctx.fillStyle = "#03061c";
            ctx.fillRect(0,0,W,H);
            
            // Estrellas
            for(let i=0;i<500;i++) {
                let sx = (i * 131) % W;
                let sy = (i * 253 + Date.now() * 0.02) % H;
                let brightness = 0.3 + Math.sin(i + Date.now() * 0.003) * 0.2;
                ctx.fillStyle = `rgba(255,240,200,${brightness})`;
                ctx.fillRect(sx, sy, (i%2)+1, (i%2)+1);
            }
            
            // Disparos
            for(let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
                ctx.fillStyle = "#ff44ff";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
                ctx.fillStyle = "white";
                ctx.fill();
            }
            
            // Enemigos
            for(let e of enemies) {
                drawEnemyShip(e);
            }
            
            // Jugador
            drawPlayerShip(player.x, player.y, player.radius, invincibilityFrames > 0);
            
            // Explosiones
            for(let ex of explosions) {
                let a = ex.life/14;
                let radius = ex.big ? 16*(1-a)+4 : 9*(1-a)+2;
                ctx.beginPath();
                ctx.arc(ex.x, ex.y, radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 100, 30, ${a*0.9})`;
                ctx.fill();
            }
            
            // Mensajes flotantes
            for(let msg of messages) {
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = `rgba(255, 255, 100, ${msg.life/30})`;
                ctx.fillText(msg.text, msg.x-12, msg.y);
            }
            
            // Mira sutil
            ctx.beginPath();
            ctx.arc(player.x, player.y-12, 22, 0, Math.PI*2);
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            if(timeLeft <= 5 && gameActive && timeLeft>0){
                ctx.font = "bold 28px monospace";
                ctx.fillStyle = "#ff5577";
                ctx.shadowBlur = 6;
                ctx.fillText("¡EVADE!", W/2-65, 65);
            }
        }
        
        // ---------- LOOP PRINCIPAL ----------
        let lastTime = 0;
        function gameLoop(nowMs) {
            requestAnimationFrame(gameLoop);
            let now = nowMs / 1000;
            let dt = Math.min(0.033, now - (lastTime || now));
            if(dt <= 0) { lastTime = now; return; }
            lastTime = now;
            
            if(gameActive) {
                updateGame();
                updateTimer(now);
            }
            draw();
        }
        
        // ---------- REINICIO ----------
        function resetGame() {
            gameActive = true;
            score = 0;
            lives = 2;
            timeLeft = 60;
            bullets = [];
            enemies = [];
            explosions = [];
            messages = [];
            shootCooldown = 0;
            enemySpawnCounter = 8;
            invincibilityFrames = 0;
            player.x = W/2;
            player.y = H-70;
            updateUI();
            document.getElementById('startBattleBtn').innerText = '🚀 INICIAR BATALLA 🚀';
            lastSecondMark = 0;
            
            if(isMobile) {
                startAutoShoot();
            }
        }
        
        function startGame() {
            resetGame();
            menuOverlay.style.display = 'none';
        }
        
        function showMenu() {
            gameActive = false;
            stopAutoShoot();
            menuOverlay.style.display = 'flex';
            updateUI();
        }
        
        // ---------- EVENTOS ----------
        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
            }
            if(e.code === 'Space' && !isMobile && gameActive) {
                shoot();
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
                e.preventDefault();
            }
        });
        
        // Controles táctiles arrastre
        function handleTouchStart(e) {
            e.preventDefault();
            touchActive = true;
            const touch = e.touches[0];
            touchX = touch.clientX;
            touchY = touch.clientY;
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchActive) return;
            const touch = e.touches[0];
            touchX = touch.clientX;
            touchY = touch.clientY;
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            touchActive = false;
        }
        
        canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
        canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('touchcancel', handleTouchEnd);
        
        // Botones táctiles
        const leftBtn = document.getElementById('leftTouch');
        const rightBtn = document.getElementById('rightTouch');
        const upBtn = document.getElementById('upTouch');
        const downBtn = document.getElementById('downTouch');
        
        leftBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchLeft=true; });
        leftBtn.addEventListener('touchend', ()=>{ touchLeft=false; });
        leftBtn.addEventListener('mousedown', ()=> touchLeft=true);
        leftBtn.addEventListener('mouseup', ()=> touchLeft=false);
        
        rightBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchRight=true; });
        rightBtn.addEventListener('touchend', ()=>{ touchRight=false; });
        rightBtn.addEventListener('mousedown', ()=> touchRight=true);
        rightBtn.addEventListener('mouseup', ()=> touchRight=false);
        
        upBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchUp=true; });
        upBtn.addEventListener('touchend', ()=>{ touchUp=false; });
        upBtn.addEventListener('mousedown', ()=> touchUp=true);
        upBtn.addEventListener('mouseup', ()=> touchUp=false);
        
        downBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchDown=true; });
        downBtn.addEventListener('touchend', ()=>{ touchDown=false; });
        downBtn.addEventListener('mousedown', ()=> touchDown=true);
        downBtn.addEventListener('mouseup', ()=> touchDown=false);
        
        // Click en canvas para disparar en escritorio
        canvas.addEventListener('click', (e) => {
            if(!isMobile && gameActive && menuOverlay.style.display !== 'flex') {
                shoot();
            }
        });
        
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        document.getElementById('startBattleBtn').addEventListener('click', () => {
            startGame();
        });
        
        // Detectar móvil
        isMobile = detectMobile();
        if(isMobile) {
            document.querySelector('.touch-panel').style.display = 'flex';
        } else {
            document.querySelector('.touch-panel').style.display = 'none';
        }
        
        // Inicializar
        updateUI();
        showMenu();
        requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
