<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Sky Catcher · ¡Atrapa monedas!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0a1f2e, #030b12);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'VT323', 'Press Start 2P', monospace;
      padding: 16px;
    }

    .game-container {
      position: relative;
      border-radius: 28px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,200,0.1);
      background: #000;
      display: inline-block;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 0 4px #ffcc44, 0 0 0 8px #2a1e0c;
      cursor: none;
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
      text-shadow: 2px 2px 0 #000;
      font-size: 1rem;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hud div {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      color: #f2e95c;
      border: 1px solid #ffcc33;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    .touch-controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 35px;
      z-index: 20;
      pointer-events: none;
    }

    .touch-btn {
      pointer-events: auto;
      background: rgba(20,20,30,0.85);
      backdrop-filter: blur(12px);
      border: 2px solid #ffaa33;
      border-radius: 60px;
      width: 70px;
      height: 70px;
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffdd88;
      text-align: center;
      line-height: 66px;
      box-shadow: 0 6px 0 #553300;
      transition: 0.05s linear;
      touch-action: manipulation;
      cursor: pointer;
    }

    .touch-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #553300;
    }

    @media (min-width: 800px) {
      .touch-controls { display: none; }
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 20px;
    }

    .menu-card {
      background: linear-gradient(145deg, #1e2a2a, #0a1217);
      border: 4px solid #f5b642;
      border-radius: 48px;
      padding: 28px 24px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 30px rgba(255,200,0,0.4);
    }

    .menu-card h1 {
      font-size: 2rem;
      color: #ffcc66;
      text-shadow: 3px 3px 0 #7a2e00;
      margin-bottom: 20px;
      font-family: monospace;
    }

    .menu-card input {
      background: #2a2418;
      border: 2px solid #f5a623;
      padding: 12px;
      width: 100%;
      margin: 12px 0;
      color: #ffeaac;
      font-size: 1rem;
      text-align: center;
      border-radius: 60px;
      font-family: monospace;
      font-weight: bold;
    }

    .menu-card button {
      background: #f5a623;
      border: none;
      padding: 12px;
      width: 100%;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: monospace;
      border-radius: 60px;
      color: #1e1a0c;
      margin-top: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a3e00;
      transition: 0.05s linear;
    }

    .menu-card button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #7a3e00;
    }

    .highscore {
      margin-top: 18px;
      color: #ffdd99;
      background: #00000066;
      padding: 8px;
      border-radius: 30px;
    }

    .footer-tip {
      font-size: 0.7rem;
      margin-top: 12px;
      color: #aaddff;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div class="hud">
    <div>🪙 SCORE: <span id="scoreValue">0</span></div>
    <div>❤️ VIDAS: <span id="livesValue">3</span></div>
    <div>⏱️ TIEMPO: <span id="timeValue">30</span>s</div>
    <div>🏆 BEST: <span id="bestValue">0</span></div>
  </div>
  <div class="touch-controls">
    <button class="touch-btn" id="leftTouch">◀</button>
    <button class="touch-btn" id="rightTouch">▶</button>
  </div>
  <div id="menuOverlay" class="menu-overlay">
    <div class="menu-card">
      <h1>🌟 SKY CATCHER 🌟</h1>
      <input type="text" id="playerName" maxlength="12" placeholder="NOMBRE" value="COLECCIONISTA">
      <button id="startGameBtn">🎮 ¡ATRAPAR! 🎮</button>
      <div class="highscore">🏆 RÉCORD 🏆<br><span id="menuBest">0</span></div>
      <div class="footer-tip">← → | A/D | ATRAPA MONEDAS | SOBREVIVE 30s</div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- CANVAS ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const width = 400, height = 600;
    canvas.width = width;
    canvas.height = height;

    // ---------- CONSTANTES (dificultad suave) ----------
    const PLAYER_WIDTH = 90;        // Más ancho para atrapar fácil
    const PLAYER_HEIGHT = 28;
    const PLAYER_Y = height - 55;
    let playerX = width/2 - PLAYER_WIDTH/2;
    let moveLeft = false, moveRight = false;
    let touchLeft = false, touchRight = false;

    // Monedas
    let coins = [];
    const COIN_RADIUS = 12;
    let coinBaseSpeed = 70;         // Velocidad inicial más lenta
    let currentCoinSpeed = 70;
    let coinSpawnTimer = 0;
    let coinSpawnDelay = 0.85;       // Inicio más espaciado
    let minSpawnDelay = 0.55;        // Máxima frecuencia más relajada
    let maxCoinSpeed = 150;          // Velocidad máxima más baja
    
    // Estado del juego
    let score = 0;
    let lives = 3;
    let timeLeft = 30.0;
    let bestScore = 0;
    let gameActive = false;
    let raceFinished = false;
    let lastTimestamp = 0;

    // Efectos visuales
    let particles = [];
    let flashAlpha = 0;
    
    // Sonido
    let audioCtx = null;
    let soundEnabled = true;

    // Elementos DOM
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const timeSpan = document.getElementById('timeValue');
    const bestSpan = document.getElementById('bestValue');
    const menuBestSpan = document.getElementById('menuBest');
    const menuOverlay = document.getElementById('menuOverlay');
    const startBtn = document.getElementById('startGameBtn');
    const playerNameInput = document.getElementById('playerName');
    const leftTouchBtn = document.getElementById('leftTouch');
    const rightTouchBtn = document.getElementById('rightTouch');

    // Cargar mejor puntuación
    try {
      let stored = localStorage.getItem('skycatcher_best');
      if(stored) bestScore = parseInt(stored);
      bestSpan.innerText = bestScore;
      menuBestSpan.innerText = bestScore;
    } catch(e) {}

    // ---------- AUDIO ----------
    function initAudio() {
      if(!audioCtx && soundEnabled) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.warn("Audio no soportado"); }
      }
    }

    function playSound(type) {
      if(!soundEnabled || !audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      if(type === 'coin') {
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
        osc.start();
        osc.stop(now+0.18);
      } else if(type === 'miss') {
        osc.frequency.value = 220;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        osc.start();
        osc.stop(now+0.35);
      } else if(type === 'win') {
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+0.5);
        osc.start();
        osc.stop(now+0.45);
      } else if(type === 'gameover') {
        osc.frequency.value = 150;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+0.7);
        osc.start();
        osc.stop(now+0.65);
      }
    }

    // ---------- PARTÍCULAS ----------
    function addParticles(x, y, color, count=6) {
      for(let i=0;i<count;i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random()-0.5)*160,
          vy: (Math.random()-0.8)*120 - 50,
          life: 0.6,
          size: 3+Math.random()*5,
          color: color
        });
      }
    }

    function updateParticles(dt) {
      for(let i=0;i<particles.length;i++) {
        let p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt * 2;
        if(p.life <= 0 || p.y > height+50) {
          particles.splice(i,1);
          i--;
        }
      }
    }

    // ---------- LÓGICA DE MONEDAS CON DIFICULTAD SUAVE ----------
    function spawnCoin() {
      // Limitar máximo de monedas en pantalla para evitar aglomeración
      if(coins.length > 12) return;
      let x = COIN_RADIUS + Math.random() * (width - COIN_RADIUS * 2);
      coins.push({
        x: x,
        y: -COIN_RADIUS,
        r: COIN_RADIUS,
        speedY: currentCoinSpeed + (Math.random() * 15 - 7)
      });
    }

    function updateCoins(dt) {
      for(let i=0;i<coins.length;i++) {
        let c = coins[i];
        c.y += c.speedY * dt;
        
        // Colisión con el jugador
        if(c.y + c.r > PLAYER_Y && c.y - c.r < PLAYER_Y + PLAYER_HEIGHT &&
           c.x + c.r > playerX && c.x - c.r < playerX + PLAYER_WIDTH) {
          coins.splice(i,1);
          i--;
          score += 10;
          updateUI();
          playSound('coin');
          addParticles(c.x, c.y, '#ffdd77', 5);
          continue;
        }
        
        // Si toca el suelo (pierde vida)
        if(c.y + c.r >= height - 15) {
          coins.splice(i,1);
          i--;
          if(gameActive) {
            lives--;
            updateUI();
            playSound('miss');
            addParticles(c.x, height-25, '#ff5555', 8);
            flashAlpha = 0.5;
            if(lives <= 0) {
              gameActive = false;
              playSound('gameover');
              if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('skycatcher_best', bestScore);
                bestSpan.innerText = bestScore;
                menuBestSpan.innerText = bestScore;
              }
            }
          }
        }
      }
    }

    // Actualizar dificultad progresiva (muy suave)
    function updateDifficulty(dt) {
      if(!gameActive) return;
      let progress = 1 - (timeLeft / 30); // 0 al inicio, 1 al final
      // Velocidad: empieza en 70, termina en 150 (lento)
      currentCoinSpeed = coinBaseSpeed + (progress * (maxCoinSpeed - coinBaseSpeed));
      // Delay: empieza 0.85s, termina en 0.55s (menos monedas)
      let targetDelay = 0.85 - (progress * 0.3);
      coinSpawnDelay = Math.max(minSpawnDelay, targetDelay);
    }

    function updateSpawn(dt) {
      if(!gameActive) return;
      coinSpawnTimer -= dt;
      if(coinSpawnTimer <= 0) {
        spawnCoin();
        coinSpawnTimer = coinSpawnDelay;
      }
    }

    // ---------- ACTUALIZACIÓN DEL JUEGO ----------
    function updateGame(dt) {
      if(!gameActive) return;

      // Movimiento del jugador
      let move = 0;
      if(moveLeft || touchLeft) move = -1;
      if(moveRight || touchRight) move = 1;
      if(move !== 0) {
        playerX += move * 500 * dt;
        playerX = Math.max(5, Math.min(width - PLAYER_WIDTH - 5, playerX));
      }

      // Temporizador
      timeLeft -= dt;
      if(timeLeft <= 0) {
        timeLeft = 0;
        gameActive = false;
        raceFinished = true;
        playSound('win');
        if(score > bestScore) {
          bestScore = score;
          localStorage.setItem('skycatcher_best', bestScore);
          bestSpan.innerText = bestScore;
          menuBestSpan.innerText = bestScore;
        }
        updateUI();
        return;
      }

      updateDifficulty(dt);
      updateCoins(dt);
      updateSpawn(dt);
      updateUI();
    }

    function updateUI() {
      scoreSpan.innerText = Math.floor(score);
      livesSpan.innerText = lives;
      timeSpan.innerText = Math.max(0, Math.floor(timeLeft));
      bestSpan.innerText = bestScore;
    }

    // ---------- DIBUJADO ----------
    function draw() {
      ctx.clearRect(0,0,width,height);
      
      // Cielo gradiente
      let grad = ctx.createLinearGradient(0,0,0,height);
      grad.addColorStop(0,'#0a2f4a');
      grad.addColorStop(1,'#1b4e6e');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,width,height);
      
      // Nubes decorativas
      ctx.fillStyle = 'rgba(255,250,210,0.7)';
      ctx.beginPath();
      ctx.ellipse(60, 70, 45, 30, 0, 0, Math.PI*2);
      ctx.ellipse(110, 50, 55, 35, 0, 0, Math.PI*2);
      ctx.ellipse(300, 120, 60, 35, 0, 0, Math.PI*2);
      ctx.ellipse(350, 90, 45, 28, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Suelo
      ctx.fillStyle = '#5b3e1f';
      ctx.fillRect(0, height-18, width, 18);
      ctx.fillStyle = '#8b6946';
      ctx.fillRect(0, height-15, width, 5);
      ctx.fillStyle = '#dbb45c';
      for(let i=0;i<12;i++) {
        ctx.fillRect(i*35 + 8, height-12, 12, 5);
      }
      
      // Monedas con brillo
      for(let c of coins) {
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#ffcc66';
        ctx.fillStyle = '#ffcc33';
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r-2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffaa22';
        ctx.beginPath();
        ctx.arc(c.x-2, c.y-2, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffffaa';
        ctx.beginPath();
        ctx.arc(c.x-3, c.y-3, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      // Jugador (cesta)
      ctx.fillStyle = '#ffaa55';
      ctx.shadowBlur = 4;
      ctx.fillRect(playerX, PLAYER_Y, PLAYER_WIDTH, PLAYER_HEIGHT);
      ctx.fillStyle = '#cc8844';
      ctx.fillRect(playerX+5, PLAYER_Y-6, PLAYER_WIDTH-10, 8);
      ctx.fillStyle = '#ffdd99';
      ctx.fillRect(playerX+8, PLAYER_Y-3, PLAYER_WIDTH-16, 5);
      ctx.fillStyle = '#7a4a1a';
      ctx.fillRect(playerX+15, PLAYER_Y+5, 10, 18);
      ctx.fillRect(playerX+PLAYER_WIDTH-25, PLAYER_Y+5, 10, 18);
      
      // Partículas
      for(let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
      ctx.globalAlpha = 1;
      
      // Flash al perder vida
      if(flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 80, 40, ${flashAlpha*0.5})`;
        ctx.fillRect(0,0,width,height);
        flashAlpha -= 0.03;
      }
      
      // Mensajes finales
      if(!gameActive) {
        ctx.font = "bold 28px monospace";
        ctx.fillStyle = "#ffcc44";
        ctx.shadowBlur = 0;
        if(raceFinished) {
          ctx.fillText("✨ VICTORIA ✨", width/2-100, height/2-40);
          ctx.font = "18px monospace";
          ctx.fillStyle = "#ffdd99";
          ctx.fillText(`PUNTOS: ${Math.floor(score)}`, width/2-70, height/2+10);
        } else {
          ctx.fillText("GAME OVER", width/2-100, height/2-40);
          ctx.font = "14px monospace";
          ctx.fillStyle = "#ffaa88";
          ctx.fillText("TOCA PARA REINICIAR", width/2-100, height/2+20);
        }
      }
    }

    // ---------- LOOP PRINCIPAL ----------
    let lastFrame = 0;
    function gameLoop(nowMs) {
      requestAnimationFrame(gameLoop);
      let now = nowMs / 1000;
      let dt = Math.min(0.033, now - (lastFrame || now));
      if(dt <= 0) { lastFrame = now; return; }
      lastFrame = now;
      
      if(gameActive) {
        updateGame(dt);
      }
      updateParticles(dt);
      draw();
    }
    
    // ---------- REINICIO Y MENÚ ----------
    function resetGame() {
      score = 0;
      lives = 3;
      timeLeft = 30.0;
      coins = [];
      particles = [];
      coinSpawnTimer = 0.2;
      coinSpawnDelay = 0.85;
      currentCoinSpeed = coinBaseSpeed;
      playerX = width/2 - PLAYER_WIDTH/2;
      gameActive = true;
      raceFinished = false;
      flashAlpha = 0;
      updateUI();
    }
    
    function startGame() {
      initAudio();
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      resetGame();
      menuOverlay.style.display = 'none';
      playSound('coin');
    }
    
    function showMenu() {
      gameActive = false;
      raceFinished = false;
      menuOverlay.style.display = 'flex';
      bestSpan.innerText = bestScore;
      menuBestSpan.innerText = bestScore;
    }
    
    // ---------- EVENTOS ----------
    window.addEventListener('keydown', (e) => {
      let key = e.key;
      if(key === 'ArrowLeft' || key === 'a' || key === 'A') {
        moveLeft = true;
        e.preventDefault();
      } else if(key === 'ArrowRight' || key === 'd' || key === 'D') {
        moveRight = true;
        e.preventDefault();
      }
      if((key === ' ' || key === 'Space') && !gameActive && menuOverlay.style.display !== 'flex') {
        showMenu();
        e.preventDefault();
      }
      if(key === 'r' && !gameActive) showMenu();
    });
    
    window.addEventListener('keyup', (e) => {
      let key = e.key;
      if(key === 'ArrowLeft' || key === 'a' || key === 'A') moveLeft = false;
      if(key === 'ArrowRight' || key === 'd' || key === 'D') moveRight = false;
    });
    
    // Táctiles
    leftTouchBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchLeft=true; });
    leftTouchBtn.addEventListener('touchend', ()=>{ touchLeft=false; });
    leftTouchBtn.addEventListener('mousedown', ()=> touchLeft=true);
    leftTouchBtn.addEventListener('mouseup', ()=> touchLeft=false);
    rightTouchBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchRight=true; });
    rightTouchBtn.addEventListener('touchend', ()=>{ touchRight=false; });
    rightTouchBtn.addEventListener('mousedown', ()=> touchRight=true);
    rightTouchBtn.addEventListener('mouseup', ()=> touchRight=false);
    
    canvas.addEventListener('click', () => {
      if(!gameActive && menuOverlay.style.display !== 'flex') showMenu();
    });
    
    startBtn.addEventListener('click', () => {
      let name = playerNameInput.value.trim();
      if(name === "") name = "COLECCIONISTA";
      startGame();
    });
    
    canvas.addEventListener('contextmenu', (e)=>e.preventDefault());
    
    // Iniciar bucle y mostrar menú
    resetGame();
    gameActive = false;
    showMenu();
    requestAnimationFrame(gameLoop);
    
    // Silenciar con M
    window.addEventListener('keydown', (e) => {
      if(e.key === 'm' || e.key === 'M') {
        soundEnabled = !soundEnabled;
        if(soundEnabled && !audioCtx) initAudio();
      }
    });
  })();
</script>
</body>
</html>
