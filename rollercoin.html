<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Roller Coin · 3 Vidas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0b2b2f, #031016);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'VT323', monospace;
      padding: 20px;
    }

    .game-container {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 56px;
      padding: 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .stats-panel {
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #ffcc88;
      border-radius: 60px;
      padding: 8px 28px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffefcf;
      text-shadow: 2px 2px 0 #5a3a00;
    }

    .stat span:first-child { font-size: 1.5rem; }
    .stat span:last-child {
      background: #1f1a0f;
      padding: 4px 14px;
      border-radius: 40px;
      min-width: 55px;
      text-align: center;
      border: 1px solid #ffaa66;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 32px;
      box-shadow: 0 0 0 5px #ffbb66, 0 12px 28px black;
      cursor: pointer;
      touch-action: none;
    }

    .difficulty-bar {
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.5);
      padding: 5px 20px;
      border-radius: 50px;
    }

    .diff-btn {
      background: #2a2a1a;
      border: none;
      padding: 6px 20px;
      border-radius: 40px;
      font-family: monospace;
      font-weight: bold;
      font-size: 1rem;
      color: #ffdd99;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 3px 0 #553300;
    }
    .diff-btn.active {
      background: #ffaa44;
      color: #1f2a0a;
      box-shadow: 0 2px 0 #884400;
      transform: translateY(1px);
    }

    .control-buttons {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }
    .ctrl-btn {
      background: #2a2a1a;
      border: 2px solid #ffbb66;
      border-radius: 50px;
      padding: 8px 24px;
      font-size: 1.1rem;
      font-weight: bold;
      font-family: monospace;
      color: #ffdd99;
      cursor: pointer;
      transition: 0.05s linear;
      box-shadow: 0 4px 0 #553300;
    }
    .ctrl-btn:active { transform: translateY(2px); }

    .touch-lanes {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-top: 10px;
    }
    .lane-btn {
      background: #2a2a1a;
      border: 2px solid #ffaa66;
      border-radius: 60px;
      width: 80px;
      padding: 8px 0;
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffdd99;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 0 #553300;
      transition: 0.05s linear;
    }
    .lane-btn:active { transform: translateY(2px); }

    @media (min-width: 701px) {
      .touch-lanes { display: none; }
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(3, 12, 18, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 32px;
    }
    .menu-card {
      background: linear-gradient(145deg, #232018, #0e0c08);
      border: 4px solid #ffbb66;
      border-radius: 56px;
      padding: 28px 20px;
      text-align: center;
      width: 300px;
    }
    .menu-card h1 {
      font-size: 1.9rem;
      color: #ffcc66;
      text-shadow: 3px 3px 0 #5a3a00;
    }
    .menu-card button {
      background: #ffaa44;
      border: none;
      padding: 10px;
      width: 100%;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 40px;
      margin-top: 15px;
      font-family: monospace;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a4400;
    }
    .menu-card button:active { transform: translateY(2px); }
    .highscore-text { margin-top: 20px; color: #ffdd99; background: #00000066; border-radius: 30px; padding: 8px; }
    .footer { font-size: 0.7rem; margin-top: 12px; color: #ccaa77; text-align: center; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-wrapper">
    <div class="stats-panel">
      <div class="stat"><span>🪙</span><span id="scoreValue">0</span></div>
      <div class="stat"><span>❤️</span><span id="livesValue">3</span></div>
      <div class="stat"><span>⏱️</span><span id="timerValue">60</span></div>
      <div class="stat"><span>🏆</span><span id="bestValue">0</span></div>
    </div>

    <div style="position: relative;">
      <canvas id="gameCanvas" width="600" height="700"></canvas>
      <div id="menuOverlay" class="menu-overlay">
        <div class="menu-card">
          <h1>⚡ ROLLER COIN</h1>
          <div class="difficulty-bar" style="margin: 15px auto; justify-content: center;">
            <button id="diffEasy" class="diff-btn active">🍃 FÁCIL</button>
            <button id="diffMed" class="diff-btn">⚡ MEDIA</button>
          </div>
          <button id="startBtn">🎲 ¡RUEDA 60 SEGUNDOS! 🎲</button>
          <div class="highscore-text">🏅 RÉCORD: <span id="menuBest">0</span></div>
          <div class="footer">🖱️ Flechas ← → · Botones táctiles<br>🔹 Atrapa monedas, 3 vidas, 60 segundos</div>
        </div>
      </div>
    </div>

    <div class="touch-lanes">
      <button class="lane-btn" id="moveLeftBtn">◀ IZQ</button>
      <button class="lane-btn" id="moveRightBtn">DER ▶</button>
    </div>
    <div class="control-buttons">
      <button id="resetGameBtn" class="ctrl-btn">🔄 REINICIAR</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- CONFIGURACIÓN ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const width = 600, height = 700;
    canvas.width = width; canvas.height = height;

    // Parámetros del juego
    const LANES = 5;
    const LANE_WIDTH = width / LANES;
    const BALL_RADIUS = 22;
    const COIN_RADIUS = 16;
    const BALL_Y = height - 60;

    let ballLane = 2;
    let coins = [];
    let score = 0;
    let lives = 3;
    let highScore = 0;
    let gameActive = false;
    let timeLeft = 60;
    let timerInterval = null;
    let animationId = null;
    let lastFrameTime = 0;
    let gameStartTime = 0;
    let lastSpawnTime = 0;

    // Parámetros de dificultad
    let difficulty = "easy";
    let coinFallSpeed = 0;
    let coinSpawnInterval = 0;
    let scoreMultiplier = 1;

    function setDifficultyParams() {
      if(difficulty === "easy") {
        coinFallSpeed = 160;
        coinSpawnInterval = 0.9;
        scoreMultiplier = 1;
      } else {
        coinFallSpeed = 320;
        coinSpawnInterval = 0.45;
        scoreMultiplier = 1.5;
      }
    }

    // UI Elements
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const timerSpan = document.getElementById('timerValue');
    const bestSpan = document.getElementById('bestValue');
    const menuBestSpan = document.getElementById('menuBest');
    const menuOverlay = document.getElementById('menuOverlay');
    const startBtn = document.getElementById('startBtn');
    const diffEasyBtn = document.getElementById('diffEasy');
    const diffMedBtn = document.getElementById('diffMed');
    const resetGameBtn = document.getElementById('resetGameBtn');
    const moveLeftBtn = document.getElementById('moveLeftBtn');
    const moveRightBtn = document.getElementById('moveRightBtn');

    // Highscore local
    try {
      let stored = localStorage.getItem('rollercoin_high');
      if(stored) highScore = parseInt(stored);
      bestSpan.innerText = highScore;
      menuBestSpan.innerText = highScore;
    } catch(e) {}

    function updateUI() {
      scoreSpan.innerText = Math.floor(score);
      livesSpan.innerText = lives;
      timerSpan.innerText = timeLeft;
      if(score > highScore) {
        highScore = Math.floor(score);
        bestSpan.innerText = highScore;
        menuBestSpan.innerText = highScore;
        localStorage.setItem('rollercoin_high', highScore);
      }
    }

    // Sonido simple
    let audioCtx = null;
    function initAudio() {
      if(!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
      }
    }
    function playCoinSound() {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      osc.start();
      osc.stop(now+0.12);
    }
    function playLifeLostSound() {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.start();
      osc.stop(now+0.18);
    }

    // Lógica de monedas
    function spawnCoin() {
      if(!gameActive) return;
      let lane = Math.floor(Math.random() * LANES);
      coins.push({
        lane: lane,
        y: -COIN_RADIUS,
        radius: COIN_RADIUS,
        collected: false
      });
    }

    function updateCoins(deltaSec) {
      for(let i=0; i<coins.length; i++) {
        let c = coins[i];
        c.y += coinFallSpeed * deltaSec;
        
        // Si la moneda pasa el fondo sin ser recogida → perder vida
        if(c.y + COIN_RADIUS > height + 20) {
          coins.splice(i,1);
          if(gameActive) {
            lives--;
            updateUI();
            playLifeLostSound();
            if(lives <= 0) {
              gameOver("💀 ¡GAME OVER! 💀");
            }
          }
          i--;
          continue;
        }
        
        // Colisión con la bola
        let ballX = ballLane * LANE_WIDTH + LANE_WIDTH/2;
        let coinX = c.lane * LANE_WIDTH + LANE_WIDTH/2;
        let distX = Math.abs(ballX - coinX);
        let distY = Math.abs(BALL_Y - c.y);
        let collisionDist = BALL_RADIUS + COIN_RADIUS;
        if(distX < collisionDist && distY < collisionDist && !c.collected) {
          c.collected = true;
          score += Math.floor(10 * scoreMultiplier);
          updateUI();
          playCoinSound();
          coins.splice(i,1);
          i--;
        }
      }
    }

    // Generador de monedas basado en tiempo
    function coinGenerator(nowSec) {
      if(!gameActive) return;
      let elapsed = nowSec - gameStartTime;
      let nextSpawn = lastSpawnTime + coinSpawnInterval;
      if(elapsed >= nextSpawn) {
        spawnCoin();
        lastSpawnTime = elapsed;
      }
    }

    // Temporizador de 60 segundos
    function startTimer() {
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if(!gameActive) return;
        if(timeLeft <= 1) {
          timeLeft = 0;
          updateUI();
          endGame("⏰ ¡TIEMPO! ⏰", true);
        } else {
          timeLeft--;
          updateUI();
        }
      }, 1000);
    }

    function endGame(message, isWin) {
      if(!gameActive) return;
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      drawEndMessage(message, isWin);
      setTimeout(() => showMenu(), 2200);
    }

    function gameOver(message) {
      if(!gameActive) return;
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      drawEndMessage(message, false);
      setTimeout(() => showMenu(), 2200);
    }

    function drawEndMessage(msg, isWin) {
      draw();
      ctx.font = "bold 26px monospace";
      ctx.fillStyle = isWin ? "#ccff88" : "#ff8866";
      ctx.shadowBlur = 0;
      ctx.fillText(msg, width/2 - ctx.measureText(msg).width/2, height/2 - 40);
      ctx.font = "16px monospace";
      ctx.fillStyle = "#ffdd99";
      ctx.fillText("Volviendo al menú...", width/2-100, height/2+20);
    }

    // Movimiento
    function moveBallLeft() {
      if(!gameActive) return;
      if(ballLane > 0) ballLane--;
    }
    function moveBallRight() {
      if(!gameActive) return;
      if(ballLane < LANES-1) ballLane++;
    }

    // Dibujo
    function draw() {
      ctx.clearRect(0, 0, width, height);
      let grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "#0f2c38");
      grad.addColorStop(1, "#021016");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      
      // Líneas de carriles
      ctx.strokeStyle = "#ffcc88aa";
      ctx.lineWidth = 2;
      for(let i=1; i<LANES; i++) {
        ctx.beginPath();
        ctx.moveTo(i * LANE_WIDTH, 0);
        ctx.lineTo(i * LANE_WIDTH, height);
        ctx.stroke();
      }
      
      // Monedas
      for(let c of coins) {
        let coinX = c.lane * LANE_WIDTH + LANE_WIDTH/2;
        let coinY = c.y;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(coinX, coinY, COIN_RADIUS-1, 0, Math.PI*2);
        ctx.fillStyle = "#FFD966";
        ctx.fill();
        ctx.fillStyle = "#F0B27A";
        ctx.beginPath();
        ctx.arc(coinX-3, coinY-3, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "gold";
        ctx.font = "bold 18px monospace";
        ctx.fillText("🪙", coinX-10, coinY+7);
        ctx.shadowBlur = 0;
      }
      
      // Bola (rodillo)
      let ballX = ballLane * LANE_WIDTH + LANE_WIDTH/2;
      ctx.shadowBlur = 8;
      let gradBall = ctx.createRadialGradient(ballX-8, BALL_Y-8, 5, ballX, BALL_Y, BALL_RADIUS);
      gradBall.addColorStop(0, "#F7DC6F");
      gradBall.addColorStop(1, "#D4AC0D");
      ctx.fillStyle = gradBall;
      ctx.beginPath();
      ctx.arc(ballX, BALL_Y, BALL_RADIUS, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#ffffffaa";
      ctx.beginPath();
      ctx.arc(ballX-5, BALL_Y-6, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath();
      ctx.arc(ballX-2, BALL_Y-4, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,215,0,0.5)";
      ctx.beginPath();
      ctx.arc(ballX-10, BALL_Y-12, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.font = "12px monospace";
      ctx.fillStyle = "#ffcc88";
      ctx.fillText(`Dificultad: ${difficulty.toUpperCase()}  x${scoreMultiplier}`, 15, 35);
    }

    // Game Loop
    function gameLoop(nowMs) {
      if(!gameActive) return;
      requestAnimationFrame(gameLoop);
      if(!lastFrameTime) { lastFrameTime = nowMs; return; }
      let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
      if(delta <= 0) { lastFrameTime = nowMs; return; }
      lastFrameTime = nowMs;
      
      let nowSec = (nowMs / 1000);
      coinGenerator(nowSec);
      updateCoins(delta);
      draw();
    }

    // Reset completo
    function resetGame() {
      if(timerInterval) clearInterval(timerInterval);
      gameActive = false;
      if(animationId) cancelAnimationFrame(animationId);
      coins = [];
      score = 0;
      lives = 3;
      timeLeft = 60;
      ballLane = 2;
      lastSpawnTime = 0;
      gameStartTime = performance.now() / 1000;
      lastFrameTime = 0;
      updateUI();
      setDifficultyParams();
      gameActive = true;
      startTimer();
      animationId = requestAnimationFrame(gameLoop);
      draw();
    }

    function startGame() {
      initAudio();
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      resetGame();
      menuOverlay.style.display = 'none';
    }

    function showMenu() {
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      menuOverlay.style.display = 'flex';
      bestSpan.innerText = highScore;
      menuBestSpan.innerText = highScore;
      draw();
    }

    // Dificultad UI
    function setDifficultyUI(level) {
      difficulty = level;
      if(level === "easy") {
        diffEasyBtn.classList.add('active');
        diffMedBtn.classList.remove('active');
      } else {
        diffMedBtn.classList.add('active');
        diffEasyBtn.classList.remove('active');
      }
      setDifficultyParams();
    }
    diffEasyBtn.addEventListener('click', () => setDifficultyUI("easy"));
    diffMedBtn.addEventListener('click', () => setDifficultyUI("medium"));

    // Controles
    window.addEventListener('keydown', (e) => {
      if(!gameActive) return;
      if(e.key === 'ArrowLeft') { moveBallLeft(); e.preventDefault(); }
      else if(e.key === 'ArrowRight') { moveBallRight(); e.preventDefault(); }
    });
    moveLeftBtn.addEventListener('click', () => moveBallLeft());
    moveRightBtn.addEventListener('click', () => moveBallRight());
    moveLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBallLeft(); });
    moveRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBallRight(); });

    // Mouse/touch en canvas para movimiento
    canvas.addEventListener('mousemove', (e) => {
      if(!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      let mouseX = (e.clientX - rect.left) * scaleX;
      let newLane = Math.floor(mouseX / LANE_WIDTH);
      newLane = Math.min(LANES-1, Math.max(0, newLane));
      ballLane = newLane;
    });
    canvas.addEventListener('touchmove', (e) => {
      if(!gameActive) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      let touchX = (e.touches[0].clientX - rect.left) * scaleX;
      let newLane = Math.floor(touchX / LANE_WIDTH);
      newLane = Math.min(LANES-1, Math.max(0, newLane));
      ballLane = newLane;
    });
    canvas.addEventListener('touchstart', (e) => e.preventDefault());

    // Botón reiniciar
    resetGameBtn.addEventListener('click', () => {
      if(gameActive) {
        endGame("🔄 Reiniciando...", false);
        setTimeout(() => startGame(), 600);
      } else {
        showMenu();
      }
    });

    startBtn.addEventListener('click', () => {
      setDifficultyUI(difficulty);
      startGame();
    });

    // Inicializar menú
    setDifficultyUI("easy");
    draw();
    showMenu();
  })();
</script>
</body>
</html>
