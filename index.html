<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mini Juegos Online - Retro Arcade Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      font-family: 'Courier New', 'VT323', 'Press Start 2P', 'Fira Code', monospace;
      position: relative;
      overflow-x: hidden;
      cursor: default;
    }

    /* Efecto scanlines retro */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 2;
    }

    /* Vignette oscura */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      position: relative;
      z-index: 5;
    }

    /* Título principal */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }

    .glitch {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #f0f0f0;
      text-shadow: 0.05em 0 0 rgba(255,0,100,0.75), -0.05em -0.025em 0 rgba(0,255,255,0.75);
      animation: glitch-shake 0.3s infinite alternate;
      letter-spacing: 4px;
    }

    @keyframes glitch-shake {
      0% { transform: translate(0); text-shadow: 0.05em 0 0 #ff006e, -0.05em -0.025em 0 #00f2ff; }
      100% { transform: translate(-0.02em, 0.01em); text-shadow: -0.05em 0 0 #ff006e, 0.05em 0.025em 0 #00f2ff; }
    }

    .sub {
      font-size: 1.2rem;
      color: #ffcc66;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 0.4rem 1.8rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-top: 0.5rem;
      border: 1px solid #ffaa33;
      font-family: monospace;
    }

    /* Grid de tarjetas */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    /* Tarjeta retro */
    .card {
      background: linear-gradient(145deg, #11171f, #080c12);
      border-radius: 28px;
      padding: 1.8rem 1.5rem 2rem;
      border: 1px solid rgba(255, 200, 100, 0.3);
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,200,0.1);
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      backdrop-filter: blur(2px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.15), transparent);
      transition: left 0.5s;
      pointer-events: none;
    }

    .card:hover::before {
      left: 150%;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: #ffcc44;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7), 0 0 15px rgba(255,200,0,0.3);
    }

    /* icono de juego */
    .game-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: inline-block;
      filter: drop-shadow(0 4px 6px black);
    }

    .card h2 {
      font-size: 1.9rem;
      color: #ffdd99;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #2a1e0c;
    }

    .card p {
      color: #bbbbaa;
      font-size: 0.9rem;
      line-height: 1.4;
      margin: 0.8rem 0 1.5rem;
      font-family: monospace;
    }

    .btn-jugar {
      background: #ffaa33;
      border: none;
      padding: 10px 24px;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      color: #1e2a1a;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 5px 0 #7a3e00;
      width: 100%;
      text-align: center;
      display: inline-block;
      text-decoration: none;
    }

    .btn-jugar:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #7a3e00;
    }

    /* pie de página retro */
    .footer {
      text-align: center;
      margin-top: 4rem;
      color: #88aadd;
      font-size: 0.75rem;
      border-top: 1px dashed #ffaa3355;
      padding-top: 2rem;
      letter-spacing: 1px;
    }

    /* efecto pixelado extra */
    .pixel-cursor {
      width: 12px;
      height: 12px;
      background: #ffcc44;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      border-radius: 0px;
      transition: 0.02s linear;
      display: none;
    }

    @media (min-width: 1024px) {
      .pixel-cursor { display: block; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="glitch">MINI JUEGOS ONLINE</div>
    <div class="sub">✦ ARCADE RETRO COLLECTION ✦</div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <!-- Las tarjetas se generarán con JS para mantener dinamismo, pero también podemos ponerlas estáticas -->
  </div>

  <div class="footer">
    <span>🕹️  SELECT YOUR GAME  🕹️</span><br>
    <span>← →  |  HOVER + CLICK  |  SONIDO RETRO</span>
  </div>
</div>

<script>
  // ======================== LISTA DE JUEGOS ========================
  // Cada juego debe tener un archivo .html en la misma carpeta (o ruta relativa)
  // Si prefieres incrustar el código directamente, podrías crear un iframe, pero es más limpio enlazar.
  // Por defecto, apuntaremos a archivos separados. Puedes renombrarlos como quieras.
  const games = [
    {
      id: "minirun",
      title: "⚡ MINIRUN",
      description: "Corre, salta y esquiva obstáculos. Doble salto, monedas y fondo con montañas. ¡Llega a la meta!",
      icon: "🏃‍♂️",
      color: "#e74c3c",
      link: "minirun.html",   // Archivo esperado: minirun.html
      sound: "platform"
    },
    {
      id: "highway",
      title: "🔥 HIGHWAY RACER 90s",
      description: "Carrera contrarreloj, esquiva coches, recoge monedas y consigue la mejor puntuación. ¡Tienes una vida extra!",
      icon: "🚗💨",
      color: "#ffaa33",
      link: "highway_racer.html",   // Archivo esperado: highway_racer.html
      sound: "racing"
    },
    {
      id: "minirun2",
      title: "✨ MINIRUN DELUXE",
      description: "Versión mejorada con partículas, efectos de sonido, mejores gráficos y doble salto pulido. ¡El clásico renovado!",
      icon: "🎮",
      color: "#4c9aff",
      link: "minirun_deluxe.html",  // puedes renombrar si lo tienes como otro archivo
      sound: "deluxe"
    }
  ];

  // Sonidos con Web Audio
  let audioCtx = null;
  let soundEnabled = true;

  function initAudio() {
    if (!audioCtx && soundEnabled) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { console.warn("Web Audio no soportado"); }
    }
  }

  function playRetroBeep(type = 'hover') {
    if (!soundEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'hover') {
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      osc.start();
      osc.stop(now + 0.1);
    } else if (type === 'click') {
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.start();
      osc.stop(now + 0.18);
    } else if (type === 'select') {
      osc.frequency.value = 520;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start();
      osc.stop(now + 0.22);
    }
  }

  // Generar tarjetas dinámicamente con eventos de sonido
  function buildCards() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-game-id', game.id);
      
      // Icono
      const iconSpan = document.createElement('div');
      iconSpan.className = 'game-icon';
      iconSpan.textContent = game.icon;
      
      const title = document.createElement('h2');
      title.textContent = game.title;
      
      const desc = document.createElement('p');
      desc.textContent = game.description;
      
      const btn = document.createElement('button');
      btn.className = 'btn-jugar';
      btn.textContent = '▶ JUGAR AHORA';
      
      card.appendChild(iconSpan);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(btn);
      
      // Eventos de sonido
      card.addEventListener('mouseenter', (e) => {
        if (soundEnabled && audioCtx) {
          playRetroBeep('hover');
          // pequeño efecto visual de brillo
          card.style.transition = '0.05s linear';
        }
      });
      
      // Click para redirigir al juego
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (soundEnabled && audioCtx) {
          playRetroBeep('click');
          setTimeout(() => {
            window.location.href = game.link;
          }, 80);
        } else {
          window.location.href = game.link;
        }
      });
      
      // También clic en la tarjeta entera (excepto si es botón)
      card.addEventListener('click', (e) => {
        if (e.target !== btn) {
          if (soundEnabled && audioCtx) {
            playRetroBeep('select');
            setTimeout(() => {
              window.location.href = game.link;
            }, 100);
          } else {
            window.location.href = game.link;
          }
        }
      });
      
      grid.appendChild(card);
    });
  }

  // Inicializar sonido con interacción del usuario (la primera vez que se hace click en cualquier lugar)
  let audioInitialized = false;
  function enableAudioOnFirstInteraction() {
    if (audioInitialized) return;
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        audioInitialized = true;
        // reproducir un pequeño sonido de bienvenida
        playRetroBeep('select');
      }).catch(e=>console.log);
    } else {
      audioInitialized = true;
      if(audioCtx) playRetroBeep('select');
    }
  }
  
  // Detectar cualquier interacción para activar audio (requerido por navegadores)
  window.addEventListener('click', enableAudioOnFirstInteraction, { once: true });
  window.addEventListener('touchstart', enableAudioOnFirstInteraction, { once: true });
  
  // cursor pixelado opcional
  const cursorDiv = document.createElement('div');
  cursorDiv.className = 'pixel-cursor';
  document.body.appendChild(cursorDiv);
  document.addEventListener('mousemove', (e) => {
    cursorDiv.style.left = e.clientX - 6 + 'px';
    cursorDiv.style.top = e.clientY - 6 + 'px';
  });
  document.addEventListener('mouseleave', () => {
    cursorDiv.style.display = 'none';
  });
  document.addEventListener('mouseenter', () => {
    cursorDiv.style.display = 'block';
  });
  
  // Build de las tarjetas
  buildCards();
  
  // Agregar efecto de sonido al inicio silencioso pero preparado
  setTimeout(() => {
    if (!audioCtx && soundEnabled) initAudio();
  }, 100);
</script>

<!-- Instrucciones para el usuario: si los juegos están en archivos separados, deben estar en la misma carpeta con los nombres indicados -->
</body>
</html>
