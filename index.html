<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Mini Juegos Online - Retro Arcade Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      font-family: 'Courier New', 'VT323', 'Press Start 2P', 'Fira Code', monospace;
      position: relative;
      overflow-x: hidden;
      cursor: default;
    }

    /* Efecto scanlines retro */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 2;
    }

    /* Vignette oscura */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      position: relative;
      z-index: 5;
    }

    /* Título principal */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }

    .glitch {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #f0f0f0;
      text-shadow: 0.05em 0 0 rgba(255,0,100,0.75), -0.05em -0.025em 0 rgba(0,255,255,0.75);
      animation: glitch-shake 0.3s infinite alternate;
      letter-spacing: 4px;
    }

    @keyframes glitch-shake {
      0% { transform: translate(0); text-shadow: 0.05em 0 0 #ff006e, -0.05em -0.025em 0 #00f2ff; }
      100% { transform: translate(-0.02em, 0.01em); text-shadow: -0.05em 0 0 #ff006e, 0.05em 0.025em 0 #00f2ff; }
    }

    .sub {
      font-size: 1.2rem;
      color: #ffcc66;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 0.4rem 1.8rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-top: 0.5rem;
      border: 1px solid #ffaa33;
      font-family: monospace;
    }

    /* Grid de tarjetas - por defecto flexible */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    /* Tarjeta retro */
    .card {
      background: linear-gradient(145deg, #11171f, #080c12);
      border-radius: 28px;
      padding: 1.8rem 1.5rem 2rem;
      border: 1px solid rgba(255, 200, 100, 0.3);
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,200,0.1);
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      backdrop-filter: blur(2px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.15), transparent);
      transition: left 0.5s;
      pointer-events: none;
    }

    .card:hover::before {
      left: 150%;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: #ffcc44;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7), 0 0 15px rgba(255,200,0,0.3);
    }

    /* icono de juego */
    .game-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: inline-block;
      filter: drop-shadow(0 4px 6px black);
    }

    .card h2 {
      font-size: 1.9rem;
      color: #ffdd99;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #2a1e0c;
    }

    .card p {
      color: #bbbbaa;
      font-size: 0.9rem;
      line-height: 1.4;
      margin: 0.8rem 0 1.5rem;
      font-family: monospace;
    }

    .btn-jugar {
      background: #ffaa33;
      border: none;
      padding: 10px 24px;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      color: #1e2a1a;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 5px 0 #7a3e00;
      width: 100%;
      text-align: center;
      display: inline-block;
      text-decoration: none;
    }

    .btn-jugar:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #7a3e00;
    }

    /* pie de página retro */
    .footer {
      text-align: center;
      margin-top: 4rem;
      color: #88aadd;
      font-size: 0.75rem;
      border-top: 1px dashed #ffaa3355;
      padding-top: 2rem;
      letter-spacing: 1px;
    }

    /* efecto pixelado extra (solo escritorio) */
    .pixel-cursor {
      width: 12px;
      height: 12px;
      background: #ffcc44;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      border-radius: 0px;
      transition: 0.02s linear;
      display: none;
    }

    @media (min-width: 1024px) {
      .pixel-cursor { display: block; }
    }

    /* ========== RESPONSIVE MÓVIL: 2 COLUMNAS + TARJETAS ULTRACOMPACTAS ========== */
    @media (max-width: 640px) {
      .container {
        padding: 1rem 0.75rem 2rem;
      }

      .hero {
        margin-bottom: 1.5rem;
      }

      .glitch {
        font-size: 2rem;
        letter-spacing: 2px;
        animation: glitch-shake 0.25s infinite alternate;
      }

      .sub {
        font-size: 0.7rem;
        padding: 0.2rem 0.8rem;
        margin-top: 0.2rem;
      }

      /* Grid con 2 columnas fijas, sin min-width grande */
      .games-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-top: 1rem;
      }

      /* Tarjetas ultracompactas */
      .card {
        padding: 0.7rem 0.5rem 0.9rem;
        border-radius: 18px;
        transition: transform 0.1s ease;
        /* Forzamos que ocupen el espacio disponible sin romper */
        min-width: 0;
      }

      /* Icono mucho más pequeño */
      .game-icon {
        font-size: 1.8rem;
        margin-bottom: 0.3rem;
        display: block;
        text-align: center;
      }

      /* Título reducido */
      .card h2 {
        font-size: 0.85rem;
        margin-bottom: 0.2rem;
        text-align: center;
        letter-spacing: 0;
        text-shadow: 1px 1px 0 #2a1e0c;
        white-space: nowrap;
        overflow-x: hidden;
        text-overflow: ellipsis;
        padding: 0 0.1rem;
      }

      /* Descripción más concisa */
      .card p {
        font-size: 0.6rem;
        line-height: 1.2;
        margin: 0.3rem 0 0.6rem;
        text-align: center;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Botón más pequeño y centrado */
      .btn-jugar {
        padding: 4px 6px;
        font-size: 0.65rem;
        box-shadow: 0 2px 0 #7a3e00;
        border-radius: 30px;
        width: 90%;
        margin: 0 auto;
        display: block;
      }

      .btn-jugar:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #7a3e00;
      }

      /* Footer compacto */
      .footer {
        margin-top: 1.8rem;
        padding-top: 1rem;
        font-size: 0.55rem;
      }

      /* Quitar hover excesivo en móvil, mantener efecto táctil */
      .card:active {
        transform: scale(0.97);
        transition: 0.02s linear;
      }
    }

    /* Para pantallas muy estrechas (< 480px) ajustamos un poco más los textos y padding */
    @media (max-width: 480px) {
      .games-grid {
        gap: 0.6rem;
      }
      .card {
        padding: 0.6rem 0.4rem 0.8rem;
      }
      .game-icon {
        font-size: 1.5rem;
        margin-bottom: 0.2rem;
      }
      .card h2 {
        font-size: 0.75rem;
        white-space: normal;
        word-break: break-word;
        line-height: 1.2;
      }
      .card p {
        font-size: 0.55rem;
        -webkit-line-clamp: 2;
      }
      .btn-jugar {
        font-size: 0.6rem;
        padding: 3px 5px;
        width: 95%;
      }
      .glitch {
        font-size: 1.7rem;
      }
    }

    /* Para móviles en landscape: mantener 2 columnas pero con mejor altura */
    @media (max-width: 800px) and (orientation: landscape) {
      .games-grid {
        gap: 0.8rem;
      }
      .card {
        padding: 0.5rem 0.4rem 0.7rem;
      }
      .card h2 {
        font-size: 0.8rem;
        white-space: nowrap;
      }
      .card p {
        font-size: 0.55rem;
        -webkit-line-clamp: 1;
      }
      .btn-jugar {
        font-size: 0.6rem;
      }
    }

    /* Mejora de accesibilidad táctil */
    button, .card {
      touch-action: manipulation;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="glitch">MINI JUEGOS ONLINE</div>
    <div class="sub">✦ ARCADE RETRO COLLECTION ✦</div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <!-- Las tarjetas se generarán dinámicamente con JS -->
  </div>

  <div class="footer">
    <span>🕹️  SELECT YOUR GAME  🕹️</span><br>
    <span>← →  |  TAP TO PLAY  |  SONIDO RETRO</span>
  </div>
</div>

<script>
  // ======================== LISTA DE JUEGOS ========================
  const games = [
    {
      id: "minirun",
      title: "⚡ MARIO FUCK",
      description: "Corre, salta y esquiva obstáculos. Doble salto, monedas y fondo con montañas.",
      icon: "🏃‍♂️",
      link: "mariofuck.html"
    },
    {
      id: "highway",
      title: "🔥 SPEED RUN 90s",
      description: "Carrera contrarreloj, esquiva coches, recoge monedas.",
      icon: "🚗💨",
      link: "coches.html"
    },
    {
      id: "recolecta",
      title: "✨ RECOLECT",
      description: "Recolecta tokens. ¡El clásico caído del cielo!",
      icon: "🪙",
      link: "recolecta.html"
    },
    {
      id: "simon",
      title: "🧠 SIMON",
      description: "Memoriza y repite la secuencia.",
      icon: "🔊",
      link: "simon.html"
    },
    {
      id: "snake",
      title: "🐍 SNAKE",
      description: "La serpiente clásica. Come frutas sin chocar.",
      icon: "🍎",
      link: "snake.html"
    },
    {
      id: "arkanoid",
      title: "🧱 ARKANOID",
      description: "Rompe ladrillos con la paleta.",
      icon: "🏓",
      link: "arkanoid.html"
    },
    {
      id: "rollercoin",
      title: "🙂 ROLLERCOIN",
      description: "Recoge monedas rodantes, acumula puntuación.",
      icon: "💰",
      link: "rollercoin.html"
    },
    {
      id: "invaders",
      title: "👾 INVADERS",
      description: "Invasores del espacio. Dispara y defiende.",
      icon: "🛸",
      link: "invaders.html"
    },
    {
      id: "cosmic",
      title: "🚀 COSMIC COL.",
      description: "Recoge estrellas en el espacio.",
      icon: "🌠",
      link: "cosmiccollector.html"
    }
  ];

  // Sonidos con Web Audio
  let audioCtx = null;
  let soundEnabled = true;

  function initAudio() {
    if (!audioCtx && soundEnabled) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { console.warn("Web Audio no soportado"); }
    }
  }

  function playRetroBeep(type = 'hover') {
    if (!soundEnabled || !audioCtx) return;
    if (audioCtx.state !== 'running') return;
    
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'hover') {
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      osc.start();
      osc.stop(now + 0.1);
    } else if (type === 'click') {
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.start();
      osc.stop(now + 0.18);
    } else if (type === 'select') {
      osc.frequency.value = 520;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start();
      osc.stop(now + 0.22);
    }
  }

  // Generar tarjetas dinámicamente
  function buildCards() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-game-id', game.id);
      
      const iconSpan = document.createElement('div');
      iconSpan.className = 'game-icon';
      iconSpan.textContent = game.icon;
      
      const title = document.createElement('h2');
      title.textContent = game.title;
      
      const desc = document.createElement('p');
      desc.textContent = game.description;
      
      const btn = document.createElement('button');
      btn.className = 'btn-jugar';
      btn.textContent = '▶ JUGAR';
      
      card.appendChild(iconSpan);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(btn);
      
      // Sonido hover (solo escritorio, pero no molesta en móvil)
      card.addEventListener('mouseenter', () => {
        if (soundEnabled && audioCtx && audioCtx.state === 'running') {
          playRetroBeep('hover');
        }
      });
      
      // Evento click en botón
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (soundEnabled && audioCtx && audioCtx.state === 'running') {
          playRetroBeep('click');
          setTimeout(() => {
            window.location.href = game.link;
          }, 70);
        } else {
          window.location.href = game.link;
        }
      });
      
      // Click en toda la tarjeta
      card.addEventListener('click', (e) => {
        if (e.target !== btn) {
          if (soundEnabled && audioCtx && audioCtx.state === 'running') {
            playRetroBeep('select');
            setTimeout(() => {
              window.location.href = game.link;
            }, 90);
          } else {
            window.location.href = game.link;
          }
        }
      });
      
      grid.appendChild(card);
    });
  }

  // Inicializar sonido con interacción del usuario
  let audioInitialized = false;
  function enableAudioOnFirstInteraction() {
    if (audioInitialized) return;
    initAudio();
    if (audioCtx) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
          audioInitialized = true;
          playRetroBeep('select');
        }).catch(e => console.log("Audio resume fallo", e));
      } else {
        audioInitialized = true;
        playRetroBeep('select');
      }
    } else {
      audioInitialized = true;
    }
  }
  
  window.addEventListener('click', enableAudioOnFirstInteraction, { once: true });
  window.addEventListener('touchstart', enableAudioOnFirstInteraction, { once: true });
  
  // cursor pixelado opcional (solo escritorio)
  const cursorDiv = document.createElement('div');
  cursorDiv.className = 'pixel-cursor';
  document.body.appendChild(cursorDiv);
  document.addEventListener('mousemove', (e) => {
    cursorDiv.style.left = e.clientX - 6 + 'px';
    cursorDiv.style.top = e.clientY - 6 + 'px';
  });
  document.addEventListener('mouseleave', () => {
    cursorDiv.style.display = 'none';
  });
  document.addEventListener('mouseenter', () => {
    cursorDiv.style.display = 'block';
  });
  
  buildCards();
  
  setTimeout(() => {
    if (!audioCtx && soundEnabled) initAudio();
  }, 200);
</script>
</body>
</html>
