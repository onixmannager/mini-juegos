<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
  <title>COSMIC COLLECTOR · Arcade</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #030a1a, #000000);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'VT323', monospace;
      padding: 20px;
    }

    /* Shell principal: todo fuera del canvas */
    .game-shell {
      max-width: 800px;
      width: 100%;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 64px;
      padding: 20px 20px 24px 20px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
      transition: all 0.2s;
    }

    /* Panel de estadísticas (fuera del canvas) */
    .stats-panel {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      border: 2px solid #6ee7ff;
      border-radius: 80px;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #e0f2fe;
      text-shadow: 0 0 5px #00aaff;
    }

    .stat span:first-child {
      font-size: 1.3rem;
    }

    .stat span:last-child {
      background: #0a1f2a;
      padding: 4px 14px;
      border-radius: 40px;
      min-width: 60px;
      text-align: center;
      border: 1px solid #6ee7ff;
    }

    /* Wrapper del canvas: centrado y con borde */
    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 6px 0 18px;
      border-radius: 40px;
      background: #0a1217;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,200,0.1);
      padding: 12px;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 550px;      /* Canvas más pequeño y centrado */
      border-radius: 24px;
      box-shadow: 0 0 0 4px #6ee7ff, 0 0 0 8px #2a2a3a;
      background-color: #040b1a;
      cursor: none;
      touch-action: none;
    }

    /* Barra de controles táctiles (fuera del canvas) */
    .touch-command-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 100px;
      padding: 14px 20px;
      border: 1px solid #6ee7ff;
    }

    .touch-btn {
      background: rgba(25, 35, 45, 0.95);
      backdrop-filter: blur(8px);
      border: 2px solid #6ee7ff;
      border-radius: 70px;
      width: 70px;
      height: 70px;
      font-size: 2.2rem;
      font-weight: bold;
      color: #e0f2fe;
      text-align: center;
      line-height: 66px;
      box-shadow: 0 6px 0 #0a2a3a;
      transition: 0.05s linear;
      touch-action: manipulation;
      cursor: pointer;
    }

    .touch-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0a2a3a;
    }

    /* En escritorio ocultamos la barra táctil */
    @media (min-width: 780px) {
      .touch-command-bar {
        display: none;
      }
      .game-shell {
        max-width: 750px;
      }
    }

    /* Ajustes móviles */
    @media (max-width: 779px) {
      .game-shell {
        padding: 16px 14px 20px;
      }
      .stats-panel {
        padding: 8px 16px;
        gap: 16px;
      }
      .stat {
        font-size: 1rem;
        gap: 6px;
      }
      .stat span:last-child {
        padding: 4px 10px;
        min-width: 50px;
      }
      .touch-btn {
        width: 65px;
        height: 65px;
        font-size: 2rem;
        line-height: 60px;
      }
      .touch-command-bar {
        gap: 24px;
      }
    }

    /* Menú flotante sobre el canvas */
    .menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 5, 15, 0.96);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 24px;
    }

    .menu-card {
      background: linear-gradient(145deg, #101a2a, #030811);
      border: 3px solid #6ee7ff;
      border-radius: 56px;
      padding: 28px 24px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 30px rgba(110, 231, 255, 0.3);
    }

    .menu-card h1 {
      font-size: 1.9rem;
      color: #6ee7ff;
      text-shadow: 0 0 8px #00aaff;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .menu-card button {
      background: #6ee7ff;
      border: none;
      padding: 12px;
      width: 100%;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: monospace;
      border-radius: 60px;
      color: #030811;
      margin-top: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #2a6a8a;
      transition: 0.05s linear;
    }

    .menu-card button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #2a6a8a;
    }

    .highscore-text {
      margin-top: 18px;
      color: #e0f2fe;
      background: #00000066;
      border-radius: 30px;
      padding: 8px;
    }

    .footer-tip {
      font-size: 0.7rem;
      margin-top: 12px;
      color: #6ee7ff;
    }
  </style>
</head>
<body>
<div class="game-shell">
  <!-- Panel de estadísticas (fuera del canvas) -->
  <div class="stats-panel">
    <div class="stat"><span>⭐</span><span id="scoreValue">0</span></div>
    <div class="stat"><span>❤️</span><span id="livesValue">3</span></div>
    <div class="stat"><span>⏱️</span><span id="timerValue">60</span></div>
    <div class="stat"><span>🏆</span><span id="bestValue">0</span></div>
  </div>

  <!-- Wrapper del canvas (centrado y más pequeño) -->
  <div class="canvas-wrapper" style="position: relative;">
    <canvas id="gameCanvas" width="550" height="550"></canvas>
    <div id="menuOverlay" class="menu-overlay">
      <div class="menu-card">
        <h1>✨ COSMIC COLLECTOR</h1>
        <button id="startBtn">🚀 COMENZAR MISIÓN</button>
        <div class="highscore-text">🏅 RÉCORD: <span id="menuBest">0</span></div>
        <div class="footer-tip">← → · A/D · Toca flechas<br>⭐ Atrapa estrellas · Esquiva asteroides 💥</div>
      </div>
    </div>
  </div>

  <!-- Barra de controles táctiles (fuera del canvas) -->
  <div class="touch-command-bar">
    <button class="touch-btn" id="moveLeftBtn">◀</button>
    <button class="touch-btn" id="moveRightBtn">▶</button>
  </div>
</div>

<script>
  (function() {
    // Configuración canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const width = 550, height = 550;
    canvas.width = width;
    canvas.height = height;

    // Constantes del juego (ajustadas al nuevo tamaño)
    const PLAYER_RADIUS = 16;
    const STAR_RADIUS = 8;
    const ASTEROID_RADIUS = 12;
    const PLAYER_FIXED_Y = height - 50;
    const PLAYER_SPEED = 380;
    const SPAWN_RATE_STAR = 0.65;
    const SPAWN_RATE_ASTEROID = 0.9;
    const ASTEROID_BASE_SPEED = 170;
    const STAR_BASE_SPEED = 140;

    let playerX = width / 2;
    let stars = [];
    let asteroids = [];
    let score = 0;
    let lives = 3;
    let highScore = 0;
    let gameActive = false;
    let timeLeft = 60;
    let timerInterval = null;
    let animationId = null;
    let lastTimestamp = 0;
    let lastStarSpawn = 0;
    let lastAsteroidSpawn = 0;

    // Elementos DOM
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const timerSpan = document.getElementById('timerValue');
    const bestSpan = document.getElementById('bestValue');
    const menuBestSpan = document.getElementById('menuBest');
    const menuOverlay = document.getElementById('menuOverlay');
    const startBtn = document.getElementById('startBtn');
    const moveLeftBtn = document.getElementById('moveLeftBtn');
    const moveRightBtn = document.getElementById('moveRightBtn');

    // Highscore local
    try {
      let stored = localStorage.getItem('cosmic_high');
      if(stored) highScore = parseInt(stored);
      bestSpan.innerText = highScore;
      menuBestSpan.innerText = highScore;
    } catch(e) {}

    function updateUI() {
      scoreSpan.innerText = Math.floor(score);
      livesSpan.innerText = lives;
      timerSpan.innerText = timeLeft;
      if(score > highScore) {
        highScore = Math.floor(score);
        bestSpan.innerText = highScore;
        menuBestSpan.innerText = highScore;
        localStorage.setItem('cosmic_high', highScore);
      }
    }

    // Sonido
    let audioCtx = null;
    function initAudio() {
      if(!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
      }
    }
    function playCollectSound() {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 1100;
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now+0.1);
      osc.start();
      osc.stop(now+0.09);
    }
    function playHitSound() {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 320;
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.start();
      osc.stop(now+0.18);
    }
    function playStartSound() {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now+0.25);
      osc.start();
      osc.stop(now+0.22);
    }

    // Spawns
    function spawnStar() {
      let x = Math.random() * (width - 2 * STAR_RADIUS) + STAR_RADIUS;
      stars.push({ x: x, y: -STAR_RADIUS, radius: STAR_RADIUS });
    }
    function spawnAsteroid() {
      let x = Math.random() * (width - 2 * ASTEROID_RADIUS) + ASTEROID_RADIUS;
      asteroids.push({
        x: x,
        y: -ASTEROID_RADIUS,
        radius: ASTEROID_RADIUS,
        speedY: ASTEROID_BASE_SPEED + Math.random() * 40
      });
    }

    // Actualizar objetos y colisiones
    function updateObjects(deltaSec) {
      // Estrellas
      for(let i=0; i<stars.length; i++) {
        let s = stars[i];
        s.y += STAR_BASE_SPEED * deltaSec;
        if(s.y + STAR_RADIUS > height + 50) {
          stars.splice(i,1);
          i--;
          continue;
        }
        let dx = playerX - s.x;
        let dy = PLAYER_FIXED_Y - s.y;
        if(Math.hypot(dx, dy) < PLAYER_RADIUS + STAR_RADIUS) {
          stars.splice(i,1);
          score += 10;
          updateUI();
          playCollectSound();
          i--;
        }
      }

      // Asteroides
      for(let i=0; i<asteroids.length; i++) {
        let a = asteroids[i];
        a.y += a.speedY * deltaSec;
        if(a.y + ASTEROID_RADIUS > height + 60) {
          asteroids.splice(i,1);
          i--;
          continue;
        }
        let dx = playerX - a.x;
        let dy = PLAYER_FIXED_Y - a.y;
        if(Math.hypot(dx, dy) < PLAYER_RADIUS + ASTEROID_RADIUS) {
          asteroids.splice(i,1);
          lives--;
          updateUI();
          playHitSound();
          if(lives <= 0) gameOver("💥 NAVE DESTRUIDA 💥");
          i--;
        }
      }
    }

    // Temporizador
    function startTimer() {
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if(!gameActive) return;
        if(timeLeft <= 1) {
          timeLeft = 0;
          updateUI();
          endGame("✨ ¡MISIÓN CUMPLIDA! ✨", true);
        } else {
          timeLeft--;
          updateUI();
        }
      }, 1000);
    }

    function endGame(message, isWin) {
      if(!gameActive) return;
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      drawEndMessage(message, isWin);
      setTimeout(() => showMenu(), 2200);
    }

    function gameOver(message) {
      if(!gameActive) return;
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      drawEndMessage(message, false);
      setTimeout(() => showMenu(), 2200);
    }

    function drawEndMessage(msg, isWin) {
      draw();
      ctx.font = "bold 24px monospace";
      ctx.fillStyle = isWin ? "#aaffdd" : "#ff8866";
      ctx.shadowBlur = 0;
      ctx.fillText(msg, width/2 - ctx.measureText(msg).width/2, height/2 - 40);
      ctx.font = "14px monospace";
      ctx.fillStyle = "#6ee7ff";
      ctx.fillText("Volviendo al hangar...", width/2-100, height/2+20);
    }

    // Movimiento suave
    let targetX = playerX;
    function movePlayer(deltaSec) {
      let diff = targetX - playerX;
      let move = diff * 10 * deltaSec;
      playerX += Math.min(Math.abs(diff), Math.abs(move)) * Math.sign(diff);
      playerX = Math.min(width - PLAYER_RADIUS, Math.max(PLAYER_RADIUS, playerX));
    }
    function setTargetX(value) {
      targetX = Math.min(width - PLAYER_RADIUS, Math.max(PLAYER_RADIUS, value));
    }

    // Dibujo
    function draw() {
      ctx.clearRect(0, 0, width, height);
      let grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, "#040b1a");
      grad.addColorStop(1, "#01050c");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      // Estrellas de fondo
      for(let i=0; i<120; i++) {
        ctx.fillStyle = `rgba(255,240,200,${0.3+Math.sin(Date.now()*0.002+i)*0.2})`;
        ctx.beginPath();
        ctx.arc( (i*131)%width, (i*97)%height, 1.2, 0, Math.PI*2);
        ctx.fill();
      }
      
      // Estrellas coleccionables
      for(let s of stars) {
        ctx.shadowBlur = 6;
        ctx.fillStyle = "#FFE484";
        ctx.beginPath();
        ctx.arc(s.x, s.y, STAR_RADIUS-1, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#FFB347";
        ctx.beginPath();
        ctx.arc(s.x-2, s.y-2, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = "10px monospace";
        ctx.fillText("⭐", s.x-5, s.y+3);
        ctx.shadowBlur = 0;
      }
      
      // Asteroides
      for(let a of asteroids) {
        ctx.shadowBlur = 5;
        ctx.fillStyle = "#7a5a4a";
        ctx.beginPath();
        ctx.arc(a.x, a.y, ASTEROID_RADIUS-1, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#4a2e2a";
        ctx.beginPath();
        ctx.arc(a.x-3, a.y-2, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#2a1a12";
        for(let k=0;k<4;k++) {
          ctx.beginPath();
          ctx.arc(a.x-5+Math.sin(k)*5, a.y-4+Math.cos(k*2)*4, 2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }
      
      // Nave
      ctx.shadowBlur = 6;
      ctx.fillStyle = "#6ee7ff";
      ctx.beginPath();
      ctx.moveTo(playerX, PLAYER_FIXED_Y - PLAYER_RADIUS);
      ctx.lineTo(playerX - PLAYER_RADIUS, PLAYER_FIXED_Y + 5);
      ctx.lineTo(playerX - PLAYER_RADIUS/2, PLAYER_FIXED_Y - 2);
      ctx.lineTo(playerX, PLAYER_FIXED_Y + PLAYER_RADIUS-2);
      ctx.lineTo(playerX + PLAYER_RADIUS/2, PLAYER_FIXED_Y - 2);
      ctx.lineTo(playerX + PLAYER_RADIUS, PLAYER_FIXED_Y + 5);
      ctx.fill();
      ctx.fillStyle = "#2aaacc";
      ctx.beginPath();
      ctx.ellipse(playerX, PLAYER_FIXED_Y-8, 7, 9, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(playerX-3, PLAYER_FIXED_Y-12, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(playerX+3, PLAYER_FIXED_Y-12, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.font = "11px monospace";
      ctx.fillStyle = "#6ee7ff";
      ctx.fillText("MISIÓN 60s", 12, 25);
    }

    // Game loop
    let gameStartTime = 0;
    function gameLoop(nowMs) {
      if(!gameActive) return;
      requestAnimationFrame(gameLoop);
      if(!lastTimestamp) { lastTimestamp = nowMs; return; }
      let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
      if(delta <= 0) { lastTimestamp = nowMs; return; }
      lastTimestamp = nowMs;
      
      let nowSec = nowMs / 1000;
      let elapsed = nowSec - gameStartTime;
      
      if(elapsed - lastStarSpawn >= SPAWN_RATE_STAR) {
        spawnStar();
        lastStarSpawn = elapsed;
      }
      if(elapsed - lastAsteroidSpawn >= SPAWN_RATE_ASTEROID) {
        spawnAsteroid();
        lastAsteroidSpawn = elapsed;
      }
      
      movePlayer(delta);
      updateObjects(delta);
      draw();
    }

    // Reset y control
    function resetGame() {
      if(timerInterval) clearInterval(timerInterval);
      gameActive = false;
      if(animationId) cancelAnimationFrame(animationId);
      stars = [];
      asteroids = [];
      score = 0;
      lives = 3;
      timeLeft = 60;
      playerX = width/2;
      targetX = width/2;
      lastStarSpawn = 0;
      lastAsteroidSpawn = 0;
      updateUI();
      gameActive = true;
      gameStartTime = performance.now() / 1000;
      lastTimestamp = 0;
      startTimer();
      animationId = requestAnimationFrame(gameLoop);
      draw();
    }

    function startGame() {
      initAudio();
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      playStartSound();
      resetGame();
      menuOverlay.style.display = 'none';
    }

    function showMenu() {
      gameActive = false;
      if(timerInterval) clearInterval(timerInterval);
      if(animationId) cancelAnimationFrame(animationId);
      menuOverlay.style.display = 'flex';
      bestSpan.innerText = highScore;
      menuBestSpan.innerText = highScore;
      draw();
    }

    // Controles
    window.addEventListener('keydown', (e) => {
      if(!gameActive) return;
      if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        setTargetX(targetX - 28);
        e.preventDefault();
      } else if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        setTargetX(targetX + 28);
        e.preventDefault();
      }
    });

    // Movimiento por mouse/touch en canvas
    canvas.addEventListener('mousemove', (e) => {
      if(!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      let mouseX = (e.clientX - rect.left) * scaleX;
      setTargetX(mouseX);
    });
    canvas.addEventListener('touchmove', (e) => {
      if(!gameActive) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      let touchX = (e.touches[0].clientX - rect.left) * scaleX;
      setTargetX(touchX);
    });
    canvas.addEventListener('touchstart', (e) => e.preventDefault());

    // Botones táctiles
    moveLeftBtn.addEventListener('click', () => { if(gameActive) setTargetX(targetX - 32); });
    moveRightBtn.addEventListener('click', () => { if(gameActive) setTargetX(targetX + 32); });
    moveLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) setTargetX(targetX - 32); });
    moveRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) setTargetX(targetX + 32); });

    // Botón de inicio
    startBtn.addEventListener('click', startGame);

    // Inicializar menú
    draw();
    showMenu();
  })();
</script>
</body>
</html>
